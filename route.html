.profile-copy p{margin:4px 0 0;font-family:Arial,sans-serif;font-size:12px;line-height:1.4;color:#4d5149}

.profile-seg.active.tone-scenery{background:#4d6f2e}

.btn{display:inline-block;background:var(--rust);color:#fff;padding:12px 16px;text-decoration:none;font-family:Arial,sans-serif;text-transform:uppercase;font-weight:900;letter-spacing:.08em;font-size:11px;box-shadow:4px 4px 0 rgba(0,0,0,.2)}

	.footer .social-links{margin-left:0}
}

@media(max-width:600px){
	.you-might-grid{grid-template-columns:1fr}
}

(function(){

	function setMenuOpen(open){
		links.classList.toggle('open', open);
		toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
		toggle.setAttribute('aria-label', open ? 'Close navigation menu' : 'Open navigation menu');
	}

	toggle.addEventListener('click', function(){
		const isOpen = toggle.getAttribute('aria-expanded') === 'true';
		setMenuOpen(!isOpen);
	});

	links.querySelectorAll('a').forEach(function(link){
		link.addEventListener('click', function(){ setMenuOpen(false); });
	});

	window.addEventListener('resize', function(){
		if(window.innerWidth > 760) setMenuOpen(false);
	});
})();

<script>
(function(){
	const storageConfig = window.ROUTE_STORAGE || {};
	const params = new URLSearchParams(location.search);
	const routeId = params.get('id');

	function formatTextValue(value){
		if(Array.isArray(value)){
			return value
				.map(item => String(item || '').trim())
				.filter(Boolean)
				.join(' ');
		}
		return String(value || '').trim();
	}

	function setText(id, value){ document.getElementById(id).textContent = formatTextValue(value) || 'Not specified'; }
	function trackRoutePageView(route){
		if(typeof gtag !== 'function' || !route) return;
		const routeId = String(route.id || '').trim();
		const routeName = String(route.name || '').trim();
		gtag('event', 'page_view', {
			page_title: routeName ? `${routeName} · NZ Bikepacking Routes` : document.title,
			page_location: routeId ? `${location.origin}${location.pathname}?id=${encodeURIComponent(routeId)}` : location.href,
			page_path: routeId ? `${location.pathname}?id=${encodeURIComponent(routeId)}` : location.pathname,
			route_id: routeId || undefined,
			route_name: routeName || undefined
		});
	}
	function clampProfileScore(value){
		const n = Number(value);
		if(!Number.isFinite(n)) return 0;
		return Math.max(0, Math.min(5, Math.round(n)));
	}
	function getRouteProfile(route){
		const source = route && route.routeProfile && typeof route.routeProfile === 'object' ? route.routeProfile : {};
		const mappedAdventure = Number.isFinite(Number(source.adventure)) ? source.adventure : source.remoteness;
		const mappedScenery = Number.isFinite(Number(source.scenery)) ? source.scenery : 4;
		const mappedTechnical = Number.isFinite(Number(source.technical)) ? source.technical : source.hardtailMtb;
		const mappedClimbing = Number.isFinite(Number(source.climbing)) ? source.climbing : 3;
		const mappedRemoteness = Number.isFinite(Number(source.remoteness)) ? source.remoteness : source.cellCoverage;
		return {
			adventure: clampProfileScore(mappedAdventure),
			scenery: clampProfileScore(mappedScenery),
			technical: clampProfileScore(mappedTechnical),
			climbing: clampProfileScore(mappedClimbing),
			remoteness: clampProfileScore(mappedRemoteness)
		};
	}
	function getProfileIconPath(key){
		if(key === 'adventure') return 'images/icons/AdventureIcon.webp';
		if(key === 'scenery') return 'images/icons/SceneryIcon.webp';
		if(key === 'technical') return 'images/icons/TechnicalIcon.webp';
		if(key === 'climbing') return 'images/icons/ClimbingIcon.webp';
		return 'images/icons/RemotenessIcon.webp';
	}
	function renderRouteProfile(route){
		const list = document.getElementById('route-profile-list');
		if(!list) return;

		const profile = getRouteProfile(route);
		const rows = [
			{ label: 'Adventure', description: 'Expedition feel and commitment', key: 'adventure', tone: 'adventure' },
			{ label: 'Scenery', description: 'Natural beauty and landscapes', key: 'scenery', tone: 'scenery' },
			{ label: 'Technical', description: 'Riding difficulty and terrain', key: 'technical', tone: 'technical' },
			{ label: 'Climbing', description: 'Elevation gain and steepness', key: 'climbing', tone: 'climbing' },
			{ label: 'Remoteness', description: 'Distance from towns and services', key: 'remoteness', tone: 'remoteness' }
		];

		list.innerHTML = rows.map(row => {
			const score = profile[row.key];
			const segments = Array.from({length:5}, (_, i) => `<span class="profile-seg${i < score ? ` active tone-${row.tone}` : ''}" aria-hidden="true"></span>`).join('');
			const iconSrc = getProfileIconPath(row.key);
			return `
				<div class="profile-item" aria-label="${escapeHtml(row.label)} rating ${score} out of 5">
					<span class="profile-icon" aria-hidden="true"><img src="${iconSrc}" alt="" loading="lazy"></span>
					<span class="profile-copy"><h4>${escapeHtml(row.label)}</h4><p>${escapeHtml(row.description)}</p></span>
					<span class="profile-segments">${segments}</span>
				</div>
			`;
		}).join('');
	}
	function fmtKm(m){ return Number.isFinite(m) ? `${(m/1000).toFixed(m<10000?1:0)} km` : ''; }
		function fmtPct(value){
			const n = Number(value);
			if(!Number.isFinite(n)) return '';
			const rounded = Math.round(n * 10) / 10;
			return `${Number.isInteger(rounded) ? rounded.toFixed(0) : rounded.toFixed(1)}%`;
		}
	function isUsableImagePath(path){
		if(typeof path !== 'string') return false;
		const trimmed = path.trim();
		return /^images\//i.test(trimmed) || /^routes\//i.test(trimmed);
	}
	const routePhotoFallbackPool = [
			'images/IMG20230407123248.jpg',
			'images/IMG20230407123339.jpg',
			'images/IMG20230404152757.jpg',
			'images/IMG20230406123601.jpg',
			'images/IMG20230327135544.jpg',
			'images/IMG20230327122109.jpg',
			'images/IMG20230403114937.jpg',
			'images/IMG20230403075949.jpg',
			'images/IMG20240404134026.jpg',
			'images/IMG20240404141833.jpg',
			'images/IMG20240404160808.jpg',
			'images/IMG20240407114007.jpg',
			'images/IMG20241029082316.jpg',
			'images/IMG20241030114415.jpg',
			'images/IMG20250723091903.jpg'
	];
	function stableIndexFromText(text, mod){
		const source = String(text || 'route');
		let hash = 0;
		for(let i = 0; i < source.length; i++) {
			hash = (hash * 31 + source.charCodeAt(i)) >>> 0;
		}
		return mod > 0 ? hash % mod : 0;
	}
	function getRoutePhotos(route){
		const directHighlight = typeof route?.highlightImage === 'string' ? route.highlightImage.trim() : '';
		if(isUsableImagePath(directHighlight)) return [directHighlight];

		const routeFile = String(route?.file || '').trim().replace(/\\/g, '/');
		if(/^routes\//i.test(routeFile) && routeFile.includes('/')) {
			const folder = routeFile.split('/').slice(0, -1).join('/');
			if(folder) return [`${folder}/a.webp`];
		}

		const routeId = String(route?.id || '').trim();
		if(routeId) return [`routes/${routeId}/a.webp`];

		const legacyPhotos = Array.isArray(route?.photos) ? route.photos.filter(isUsableImagePath) : [];
		if(legacyPhotos.length) return [legacyPhotos[0]];

		const start = stableIndexFromText(route?.id || route?.name, routePhotoFallbackPool.length);
		return [routePhotoFallbackPool[start]];
	}
	function normalizeImagePath(path){
		return String(path || '').trim().replace(/\\/g, '/').replace(/^\.\//, '').toLowerCase();
	}
	let apiRoutesCatalogPromise = null;
	async function getApiRoutesCatalog(){
		if(!apiRoutesCatalogPromise){
			apiRoutesCatalogPromise = fetch('/api/routes', {cache:'no-store'})
				.then(response => response.ok ? response.json() : null)
				.catch(() => null);
		}
		return apiRoutesCatalogPromise;
	}
	async function getApiRouteGalleryPhotos(routeId, normalizedHighlight){
		if(!routeId) return [];
		const apiRoutes = await getApiRoutesCatalog();
		if(!Array.isArray(apiRoutes) || !apiRoutes.length) return [];
		const apiRoute = apiRoutes.find(item => item && item.id === routeId);
		if(!apiRoute || !Array.isArray(apiRoute.galleryPhotos)) return [];
		return apiRoute.galleryPhotos
			.filter(isUsableImagePath)
			.filter(photo => normalizeImagePath(photo).endsWith('.webp'))
			.filter(photo => normalizeImagePath(photo) !== normalizedHighlight);
	}
	function getRouteFolderPath(route){
		const highlight = String(route?.highlightImage || '').trim().replace(/\\/g, '/');
		if(/^routes\//i.test(highlight) && highlight.includes('/')) return highlight.split('/').slice(0, -1).join('/');
		const gpxPath = String(route?.file || '').trim().replace(/\\/g, '/');
		if(/^routes\//i.test(gpxPath) && gpxPath.includes('/')) return gpxPath.split('/').slice(0, -1).join('/');
		const routeId = String(route?.id || '').trim();
		return routeId ? `routes/${routeId}` : '';
	}
	function canLoadImage(path){
		const safePath = encodeURI(path);

		return (async () => {
			try{
				const head = await fetch(safePath, {method:'HEAD', cache:'no-store'});
				if(head.ok) return true;
			}catch{}

			try{
				const get = await fetch(safePath, {cache:'no-store'});
				if(get.ok){
					if(get.body && typeof get.body.cancel === 'function') get.body.cancel();
					return true;
				}
			}catch{}

			return new Promise(resolve => {
				const img = new Image();
				img.onload = () => resolve(true);
				img.onerror = () => resolve(false);
				img.src = safePath;
			});
		})();
	}

	async function getRouteGalleryPhotos(route){
		const highlight = getRoutePhotos(route)[0];
		const normalizedHighlight = normalizeImagePath(highlight);
		const folder = getRouteFolderPath(route);
		if(!folder) return [];

		const fixedCandidates = Array.from({length:10}, (_, idx) => `${folder}/${idx + 1}.webp`)
			.filter(photo => normalizeImagePath(photo) !== normalizedHighlight);

		const checks = await Promise.all(
			fixedCandidates.map(async candidate => ({
				candidate,
				exists: await canLoadImage(candidate)
			}))
		);

		return checks
			.filter(item => item.exists)
			.map(item => encodeURI(item.candidate));
	}
	function parseDaysRange(value){
		const numeric = Number(value);
		if(Number.isFinite(numeric) && numeric > 0){
			const rounded = Math.round(numeric);
			return { min: rounded, max: rounded };
		}

		const text = String(value || '').trim();
		if(!text) return null;

		const rangeMatch = text.match(/(\d+(?:\.\d+)?)\s*[-\u2013\u2014]\s*(\d+(?:\.\d+)?)/);
		if(rangeMatch){
			const a = Math.round(Number(rangeMatch[1]));
			const b = Math.round(Number(rangeMatch[2]));
			if(Number.isFinite(a) && Number.isFinite(b) && a > 0 && b > 0){
				return { min: Math.min(a, b), max: Math.max(a, b) };
			}
		}

		const singleMatch = text.match(/\d+(?:\.\d+)?/);
		if(singleMatch){
			const n = Math.round(Number(singleMatch[0]));
			if(Number.isFinite(n) && n > 0){
				return { min: n, max: n };
			}
		}

		return null;
	}
	function estimateDays(route){
		const parsed = parseDaysRange(route?.days);
		if(parsed) return parsed.max;
		if(Number.isFinite(route.distanceMeters)) return Math.max(1, Math.ceil((route.distanceMeters / 1000) / 100));
		if(route.distanceLabel){
			const v = Number.parseFloat(String(route.distanceLabel).replace(/,/g,''));
			if(Number.isFinite(v)) return Math.max(1, Math.ceil(v / 100));
		}
		return null;
	}
	function getRideWithGpsUrl(route){
		if(typeof route?.rideWithGpsUrl === 'string' && /ridewithgps\.com/i.test(route.rideWithGpsUrl)) {
			return route.rideWithGpsUrl.trim();
		}
		const links = getMoreInfoLinks(route).map(entry => entry.url);
		return links.find(link => /ridewithgps\.com/i.test(String(link || ''))) || null;
	}
	function getMoreInfoLinks(route){
		const raw = route?.moreInfo;
		const values = Array.isArray(raw)
			? raw
			: (typeof raw === 'string' && raw.trim() ? [raw.trim()] : []);
		return values.map(item => {
			if(typeof item === 'string'){
				const url = item.trim();
				return url ? {url, label: ''} : null;
			}
			if(item && typeof item === 'object'){
				const url = String(item.url || item.href || item.link || '').trim();
				if(!url) return null;
				const label = String(item.label || item.text || item.title || '').trim();
				return {url, label};
			}
			return null;
		}).filter(Boolean);
	}
	function getResourceLabel(url, label, isGpx){
		if(label && label.trim()) return label.trim();
		if(isGpx) return 'Official GPX Download';
		const raw = String(url || '');
		if(/ridewithgps\.com/i.test(raw)) return 'RideWithGPS';
		if(/facebook\.com|fb\.me/i.test(raw)) return 'Facebook Group';
		try{
			return new URL(raw).hostname.replace(/^www\./, '');
		}catch{
			return raw;
		}
	}
	function getResourceIcon(kind){
		if(kind === 'ridewithgps') return '<svg class="resources-icon stroke ridewithgps" viewBox="0 0 24 24" aria-hidden="true"><circle cx="6.8" cy="17" r="3"></circle><circle cx="17.2" cy="17" r="3"></circle><path d="M6.8 17h5.4l4.1-7.2h-5.6"></path><path d="M11.4 6.6h3.3"></path></svg>';
		if(kind === 'download') return '<svg class="resources-icon stroke download" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10"></path><path d="M8.5 10.5 12 14l3.5-3.5"></path><path d="M5 19h14"></path></svg>';
		if(kind === 'facebook') return '<svg class="resources-icon facebook" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="currentColor"></circle><path d="M13.1 8.1h1.8V6h-2.1c-2 0-3.1 1.2-3.1 3v1.6H8v2.3h1.7V18h2.5v-5.1h2l.4-2.3h-2.4V9.3c0-.7.3-1.2.9-1.2Z" fill="#fff"></path></svg>';
		if(kind === 'map') return '<svg class="resources-icon stroke map" viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 6.8 9 4.6l6 2.6 5.5-2.2v12.2L15 19.4l-6-2.6-5.5 2.2Z"></path><path d="M9 4.6v12.2M15 7.2v12.2"></path></svg>';
		return '<svg class="resources-icon stroke default" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 13.5 8.8 15.2a3.2 3.2 0 1 1-4.5-4.5L6 9"></path><path d="M13.5 10.5 15.2 8.8a3.2 3.2 0 1 1 4.5 4.5L18 15"></path><path d="m9 15 6-6"></path></svg>';
	}
	function getResourceKind(url, label, isGpx){
		if(isGpx) return 'download';
		const source = `${String(url || '')} ${String(label || '')}`.toLowerCase();
		if(/ridewithgps/.test(source)) return 'ridewithgps';
		if(/facebook|fb\.me/.test(source)) return 'facebook';
		if(/guide|route\s*guide|map|trailforks|kennett/.test(source)) return 'map';
		if(/download|gpx/.test(source) || /\.gpx(\?|$)/.test(String(url || '').toLowerCase())) return 'download';
		return 'default';
	}
	function getResourceFaviconUrl(url){
		try{
			const hostname = new URL(String(url || '')).hostname;
			if(!hostname) return '';
			return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(hostname)}&sz=64`;
		}catch{
			return '';
		}
	}
	function getRideWithGpsRouteId(route){
		const url = getRideWithGpsUrl(route);
		if(!url) return null;

		try{
			const parsed = new URL(url);
			if(!/ridewithgps\.com$/i.test(parsed.hostname)) return null;

			const pathMatch = parsed.pathname.match(/\/routes\/(\d+)/i);
			if(pathMatch && pathMatch[1]) return pathMatch[1];

			const queryId = parsed.searchParams.get('id') || parsed.searchParams.get('route_id');
			if(queryId && /^\d+$/.test(queryId)) return queryId;
		}catch{}

		const fallbackMatch = String(url).match(/ridewithgps\.com\/routes\/(\d+)/i);
		return fallbackMatch && fallbackMatch[1] ? fallbackMatch[1] : null;
	}
	async function fetchRoutesCatalog(){
		try{
			const apiCatalog = await getApiRoutesCatalog();
			if(Array.isArray(apiCatalog) && apiCatalog.length) return apiCatalog;
		}catch{}

		const supabase = storageConfig?.supabase || {};
		const isSupabaseMode = storageConfig?.mode === 'supabase' && supabase.url && supabase.anonKey;

		if(isSupabaseMode){
			const table = supabase.table || 'routes';
			const endpoint = `${supabase.url.replace(/\/$/, '')}/rest/v1/${encodeURIComponent(table)}?select=*`;
			const response = await fetch(endpoint, {
				headers: {
					apikey: supabase.anonKey,
					Authorization: `Bearer ${supabase.anonKey}`,
					Accept: 'application/json'
				},
				cache: 'no-store'
			});

			if(response.ok) return await response.json();
		}

		try{
			const indexResponse = await fetch('data/routes-index.json', {cache:'no-store'});
			if(indexResponse.ok){
				const parsed = await indexResponse.json();
				const entries = (() => {
					const source = Array.isArray(parsed) ? parsed : (Array.isArray(parsed?.routes) ? parsed.routes : []);
					return source.map(item => {
						if(typeof item === 'string') return {id: item, file: 'route.json'};
						if(item && typeof item === 'object') {
							return {
								id: String(item.id || '').trim(),
								file: String(item.file || 'route.json').trim() || 'route.json'
							};
						}
						return null;
					}).filter(item => item && item.id);
				})();

				if(entries.length){
					const routeResponses = await Promise.all(entries.map(async entry => {
						const routeRes = await fetch(`routes/${encodeURIComponent(entry.id)}/${encodeURIComponent(entry.file)}`, {cache:'no-store'});
						if(!routeRes.ok) return null;
						try { return await routeRes.json(); } catch { return null; }
					}));
					const routes = routeResponses.filter(route => route && typeof route === 'object' && !Array.isArray(route));
					if(routes.length) return routes;
				}
			}
		}catch{}

		throw new Error('Failed to load routes catalog');
	}
	function getYouTubeId(value){
		const raw = String(value || '').trim();
		if(!raw) return '';

		if(/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;

		try{
			const url = new URL(raw);
			if(url.hostname.includes('youtu.be')) {
				const id = url.pathname.replace(/^\//, '').split('/')[0];
				return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : '';
			}

			if(url.hostname.includes('youtube.com')) {
				const fromQuery = url.searchParams.get('v');
				if(fromQuery && /^[a-zA-Z0-9_-]{11}$/.test(fromQuery)) return fromQuery;

				const parts = url.pathname.split('/').filter(Boolean);
				const embedIdx = parts.findIndex(part => part === 'embed' || part === 'shorts' || part === 'live');
				if(embedIdx >= 0 && parts[embedIdx + 1] && /^[a-zA-Z0-9_-]{11}$/.test(parts[embedIdx + 1])) {
					return parts[embedIdx + 1];
				}
			}
		}catch{}

		return '';
	}
	function getYouTubeVideoIds(route){
		const raw = route?.youtubeVideos;
		const values = Array.isArray(raw)
			? raw
			: (typeof raw === 'string' && raw.trim() ? [raw.trim()] : []);
		const ids = values.map(getYouTubeId).filter(Boolean);
		return ids.slice(0, 3);
	}

	function formatSurfaceSplit(route){
		if(typeof route?.surfaceSplit === 'string' && route.surfaceSplit.trim()) {
			return route.surfaceSplit.trim();
		}
		const sealed = Number(route.sealedPct);
		const gravel = Number(route.gravelPct);
		const track = Number(route.singletrackPct);
		const parts = [];
		if(Number.isFinite(gravel) && gravel > 0) parts.push(`${gravel}% Gravel`);
		if(Number.isFinite(sealed) && sealed > 0) parts.push(`${sealed}% Road`);
		if(Number.isFinite(track) && track > 0) parts.push(`${track}% Track`);
		return parts.length ? parts.join(' / ') : null;
	}

	function fmtElevation(route){
		if(typeof route?.totalElevationLabel === 'string' && route.totalElevationLabel.trim()) {
			return route.totalElevationLabel.trim();
		}
		if(typeof route?.climbingLabel === 'string' && route.climbingLabel.trim()) {
			return route.climbingLabel.trim();
		}
		const gain = route.totalElevationMeters ?? route.elevationGainMeters ?? route.climbingMeters ?? route.totalClimbMeters;
		const n = Number(gain);
		if(!Number.isFinite(n) || n <= 0) return null;
		return `${n.toLocaleString()} m`;
	}

	function getUnpavedPercentLabel(route){
		if(typeof route?.unpavedLabel === 'string' && route.unpavedLabel.trim()) {
			return route.unpavedLabel.trim();
		}
		const direct = Number(route?.unpavedPct);
		if(Number.isFinite(direct) && direct > 0) return fmtPct(direct);

		const gravel = Number(route?.gravelPct);
		const track = Number(route?.singletrackPct);
		if((Number.isFinite(gravel) && gravel > 0) || (Number.isFinite(track) && track > 0)) {
			const total = (Number.isFinite(gravel) ? gravel : 0) + (Number.isFinite(track) ? track : 0);
			return fmtPct(total);
		}

		if(typeof route?.surfaceSplit === 'string' && route.surfaceSplit.trim()) {
			const text = route.surfaceSplit;
			const gravelMatch = text.match(/(\d+(?:\.\d+)?)\s*%\s*gravel/i);
			const trackMatch = text.match(/(\d+(?:\.\d+)?)\s*%\s*(track|singletrack)/i);
			const gravelVal = gravelMatch ? Number(gravelMatch[1]) : 0;
			const trackVal = trackMatch ? Number(trackMatch[1]) : 0;
			const total = (Number.isFinite(gravelVal) ? gravelVal : 0) + (Number.isFinite(trackVal) ? trackVal : 0);
			if(total > 0) return fmtPct(total);
		}

		return '—';
	}

	function getDaysLabel(route, estDays){
		const parsed = parseDaysRange(route?.days);
		if(parsed){
			return parsed.min === parsed.max ? String(parsed.min) : `${parsed.min}-${parsed.max}`;
		}
		return estDays ? String(estDays) : '—';
	}

	function normalizeDifficultyTier(value){
		const plain = String(value || '').trim().toLowerCase();
		if(plain === 'easy' || plain === 'intermediate' || plain === 'hard') return plain;

		const fractionMatch = plain.match(/(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)/);
		if(fractionMatch){
			const top = Number(fractionMatch[1]);
			const bottom = Number(fractionMatch[2]);
			if(Number.isFinite(top) && Number.isFinite(bottom) && bottom > 0){
				const normalized = (top / bottom) * 5;
				if(normalized <= 2) return 'easy';
				if(normalized >= 4) return 'hard';
				return 'intermediate';
			}
		}

		const numericMatch = plain.match(/\d+(?:\.\d+)?/);
		if(numericMatch){
			const score = Number(numericMatch[0]);
			if(Number.isFinite(score)){
				if(score <= 2) return 'easy';
				if(score >= 4) return 'hard';
				return 'intermediate';
			}
		}

		return 'intermediate';
	}

	function titleCaseDifficulty(tier){
		return tier.charAt(0).toUpperCase() + tier.slice(1);
	}

	function getCompactDifficultyLabel(tier){
		return tier === 'intermediate' ? 'Medium' : titleCaseDifficulty(tier);
	}

	function getRouteDifficultyProfile(route){
		const level = normalizeDifficultyTier(route?.difficultyLevel || route?.difficulty);
		const generic = {
			easy: 'This route stays close to regular services and has straightforward terrain. It is a good choice for riders wanting a lower-risk multi-day trip.',
			intermediate: 'This route mixes manageable terrain with enough climbing and distance to require planning. Riders with some bikepacking experience should find it achievable.',
			hard: 'This route includes bigger elevation, remoteness, or technical surfaces that increase commitment. Plan refuelling and weather windows carefully before starting.'
		};
		const customDifficultyText = Array.isArray(route?.text2)
			? route.text2
				.map(text => String(text || '').trim())
				.filter(Boolean)
				.join(' ')
			: ((typeof route?.text2 === 'string' && route.text2.trim())
				? route.text2.trim()
				: ((typeof route?.difficultyExplanation === 'string' && route.difficultyExplanation.trim())
					? route.difficultyExplanation.trim()
					: ''));
		return {
			level,
			explanation: customDifficultyText || generic[level]
		};
	}

	function getRecommendedBuilderPreset(route, difficultyProfile){
		if(route && typeof route.builderPreset === 'object' && route.builderPreset){
			const preset = route.builderPreset;
			return {
				bike: String(preset.bike || 'Gravel Bike'),
				size: String(preset.size || 'M').toUpperCase(),
				weeks: Math.max(1, Math.min(10, Number.isFinite(Number(preset.weeks)) ? Math.round(Number(preset.weeks)) : 1)),
				options: Array.isArray(preset.options) ? preset.options.map(String) : []
			};
		}

		const days = estimateDays(route) || 3;
		const difficultyTier = difficultyProfile?.level || normalizeDifficultyTier(route?.difficulty);
		const singletrackPct = Number(route?.singletrackPct);
		const hardRoute = difficultyTier === 'hard' || (Number.isFinite(singletrackPct) && singletrackPct >= 20);

		let bike = String(route?.recommendedBike || '').trim();
		if(!bike){
			bike = 'Gravel Bike';
			if(hardRoute){
				bike = 'Hardtail MTB';
			}else if(days >= 7){
				bike = 'Touring Bike';
			}
		}

		const options = [
			'Frame Bag (Large)',
			'Saddle Bag (13L)',
			'Sleeping Quilt (3-Season)'
		];
		if(days >= 3) options.push('Bar Roll + Harness');
		if(days >= 5) options.push('Fork Cages (×2)');
		if(days >= 2) options.push('Top Tube Bag');
		if(hardRoute) options.push('Stem Bag');

		return {
			bike,
			size: 'M',
			weeks: Math.max(1, Math.min(10, Math.ceil(days / 7))),
			options
		};
	}

	function getRecommendedBuilderHref(route, preset){
		const query = new URLSearchParams();
		query.set('bike', preset.bike);
		query.set('size', preset.size);
		query.set('weeks', String(preset.weeks));
		query.set('options', preset.options.join('|'));
		query.set('routeName', route?.name || 'This route');
		return `builder.html?${query.toString()}`;
	}

	function getManualSimilarRoutes(route, routes){
		if(!Array.isArray(route?.similarRoutes) || !Array.isArray(routes)) return [];

		const seen = new Set();
		return route.similarRoutes
			.map(entry => {
				if(typeof entry === 'string') return entry;
				if(entry && typeof entry === 'object') return entry.id;
				return '';
			})
			.map(id => String(id || '').trim())
			.filter(id => {
				if(!id || id === route.id || seen.has(id)) return false;
				seen.add(id);
				return true;
			})
			.map(id => routes.find(candidate => candidate.id === id))
			.filter(candidate => candidate && candidate.name);
	}

	function getYouMightAlsoLikeRoutes(route, routes, limit = 3){
		if(!route || !Array.isArray(routes) || !routes.length || limit <= 0) return [];

		const picks = [];
		const seen = new Set([route.id]);
		const currentTier = normalizeDifficultyTier(route?.difficultyLevel || route?.difficulty);

		function tryAdd(candidate){
			if(!candidate || !candidate.id || seen.has(candidate.id)) return;
			seen.add(candidate.id);
			picks.push(candidate);
		}

		getManualSimilarRoutes(route, routes).forEach(tryAdd);

		const sameIsland = routes
			.filter(candidate => candidate && candidate.id !== route.id && candidate.island === route.island)
			.sort((a, b) => {
				const aTier = normalizeDifficultyTier(a?.difficultyLevel || a?.difficulty);
				const bTier = normalizeDifficultyTier(b?.difficultyLevel || b?.difficulty);
				const aPenalty = aTier === currentTier ? 0 : 1;
				const bPenalty = bTier === currentTier ? 0 : 1;
				if(aPenalty !== bPenalty) return aPenalty - bPenalty;
				return String(a.name || a.id).localeCompare(String(b.name || b.id), undefined, {sensitivity:'base'});
			});

		sameIsland.forEach(tryAdd);

		if(picks.length < limit){
			const others = routes
				.filter(candidate => candidate && candidate.id !== route.id)
				.sort((a, b) => String(a.name || a.id).localeCompare(String(b.name || b.id), undefined, {sensitivity:'base'}));
			others.forEach(tryAdd);
		}

		return picks.slice(0, limit);
	}

	function renderYouMightAlsoLike(currentRoute, routes){
		const section = document.getElementById('you-might-section');
		const grid = document.getElementById('you-might-grid');
		if(!section || !grid) return;

		const suggested = getYouMightAlsoLikeRoutes(currentRoute, routes, 3);
		if(!suggested.length){
			section.style.display = 'none';
			grid.innerHTML = '';
			return;
		}

		section.style.display = '';
		grid.innerHTML = suggested.map(route => {
			const routeTier = normalizeDifficultyTier(route?.difficultyLevel || route?.difficulty);
			const badgeClass = `badge-${routeTier}`;
			const badgeLabel = titleCaseDifficulty(routeTier);
			const image = getRoutePhotos(route)[0] || 'images/IMG20230407123248.jpg';
			const distance = route.distanceLabel || (Number.isFinite(route.distanceMeters) ? fmtKm(route.distanceMeters) : '—');
			const elevation = fmtElevation(route) || '—';
			const region = route.island === 'north' ? 'North Island' : route.island === 'south' ? 'South Island' : 'Aotearoa';

			return `
				<article class="route-card">
					<a class="route-img" href="route.html?id=${encodeURIComponent(route.id)}" aria-label="View route ${escapeHtml(route.name || 'Route')}">
						<img src="${escapeHtml(image)}" alt="${escapeHtml(route.name || 'Route')}">
						<span class="route-badge ${badgeClass}">${escapeHtml(badgeLabel)}</span>
					</a>
					<div class="route-body">
						<h3>${escapeHtml(route.name || 'Route')}</h3>
						<div class="region">${escapeHtml(region)}</div>
						<p>${escapeHtml(route.description || 'Route details and planning notes available on the route page.')}</p>
						<div class="route-meta">
							<div><b>${escapeHtml(distance)}</b>Distance</div>
							<div><b>${escapeHtml(elevation)}</b>Elevation</div>
						</div>
						<div class="route-actions">
							<a class="btn-sm primary" href="route.html?id=${encodeURIComponent(route.id)}">VIEW ROUTE</a>
						</div>
					</div>
				</article>
			`;
		}).join('');
	}

	function getRecommendedSetupText(route, preset){
		if(typeof route?.text4 === 'string' && route.text4.trim()) {
			return route.text4.trim();
		}
		if(typeof route?.recommendedSetupText === 'string' && route.recommendedSetupText.trim()) {
			return route.recommendedSetupText.trim();
		}
		return '';
	}

	function escapeHtml(value){
		return String(value || '').replace(/[&<>\"']/g, ch => ({
			'&': '&amp;',
			'<': '&lt;',
			'>': '&gt;',
			'\"': '&quot;',
			"'": '&#39;'
		}[ch]));
	}

	function renderRouteSummary(route, difficultyProfile){
		const summaryContainer = document.getElementById('route-summary');
		if(!summaryContainer) return;

		if(Array.isArray(route?.text1) && route.text1.length){
			summaryContainer.innerHTML = route.text1
				.map(text => String(text || '').trim())
				.filter(Boolean)
				.map(text => `<p>${escapeHtml(text)}</p>`)
				.join('');
			return;
		}
		if(typeof route?.text1 === 'string' && route.text1.trim()){
			summaryContainer.innerHTML = `<p>${escapeHtml(route.text1.trim())}</p>`;
			return;
		}

		if(Array.isArray(route?.routeSummary) && route.routeSummary.length){
			summaryContainer.innerHTML = route.routeSummary
				.map(text => String(text || '').trim())
				.filter(Boolean)
				.map(text => `<p>${escapeHtml(text)}</p>`)
				.join('');
			return;
		}
		if(typeof route?.routeSummary === 'string' && route.routeSummary.trim()){
			summaryContainer.innerHTML = `<p>${escapeHtml(route.routeSummary.trim())}</p>`;
			return;
		}

		const days = estimateDays(route);
		const distance = route.distanceLabel || (Number.isFinite(route.distanceMeters) ? fmtKm(route.distanceMeters) : null);
		const surface = formatSurfaceSplit(route) || 'mixed surfaces across road, gravel, and track';
		const season = route.bestSeason || 'the more stable spring to autumn months';
		const difficulty = titleCaseDifficulty(difficultyProfile?.level || normalizeDifficultyTier(route?.difficulty));
		const resupply = route.resupply || 'variable refuelling gaps where carrying extra water and food is wise';
		const accommodation = route.accommodation || 'a mix of camping, huts, and local stays depending on your pace';
		const caution = route.beAwareOf || 'weather swings and changing trail conditions in exposed sections';
		const crux = route.trickiestSection || 'The most committing section usually comes late in the day, so leave margin for weather, navigation, and conservative pacing.';

		const paragraph1 = `${route.name} is a ${difficulty.toLowerCase()} bikepacking route${distance ? ` covering about ${distance}` : ''}${days ? `, commonly ridden over ${days} day${days === 1 ? '' : 's'}` : ''}. ${route.description || 'It combines scenic riding with enough variety to stay engaging from start to finish.'} Riders can expect ${surface} as the route unfolds.`;
		const paragraph2 = `Good planning makes this route far more enjoyable. The best riding window is generally ${season}, with resupply described as ${resupply}. Overnight options are typically ${accommodation}, so most riders can choose between lighter days with more stops or longer pushes between services.`;
		const paragraph3 = `The key section to manage is: ${crux} Keep a close eye on ${caution}, especially if conditions change during the day. A steady pace, a conservative weather call, and extra water or food buffer are usually the difference between a stressful day and a great one.`;

		summaryContainer.innerHTML = [paragraph1, paragraph2, paragraph3]
			.map(text => `<p>${escapeHtml(text)}</p>`)
			.join('');
	}

	function stableIndexFromRoute(route, mod){
		const source = String(route?.id || route?.name || 'route');
		let hash = 0;
		for(let i = 0; i < source.length; i++) hash = (hash * 31 + source.charCodeAt(i)) >>> 0;
		return mod > 0 ? hash % mod : 0;
	}

	function initRouteGallery(container, photos, routeName){
		if(!container) return;

		const items = Array.isArray(photos) ? photos.filter(Boolean) : [];
		if(!items.length){
			container.innerHTML = '';
			container.style.display = 'none';
			return;
		}

		container.style.display = '';
		const safeName = escapeHtml(routeName || 'Route photo');
		const slidesHtml = items.map((src, idx) => `
			<div class="gallery-slide${idx === 0 ? ' active' : ''}" data-slide-index="${idx}">
				<img src="${src}" alt="${safeName} photo ${idx + 1}" loading="lazy">
			</div>
		`).join('');
		const dotsHtml = items.map((_, idx) => `
			<button
				type="button"
				class="gallery-dot${idx === 0 ? ' active' : ''}"
				data-dot-index="${idx}"
				aria-label="Show photo ${idx + 1}">
			</button>
		`).join('');

		container.innerHTML = `
			<div class="gallery-carousel" aria-label="Route photo gallery">
				<div class="gallery-track">
					${slidesHtml}
				</div>
				<button type="button" class="gallery-nav prev" aria-label="Previous photo">&#10094;</button>
				<button type="button" class="gallery-nav next" aria-label="Next photo">&#10095;</button>
				<div class="gallery-dots">${dotsHtml}</div>
			</div>
		`;

		const slideEls = Array.from(container.querySelectorAll('.gallery-slide'));
		const dotEls = Array.from(container.querySelectorAll('.gallery-dot'));
		const prevBtn = container.querySelector('.gallery-nav.prev');
		const nextBtn = container.querySelector('.gallery-nav.next');

		if(items.length <= 1){
			if(prevBtn) prevBtn.style.display = 'none';
			if(nextBtn) nextBtn.style.display = 'none';
			const dotsWrap = container.querySelector('.gallery-dots');
			if(dotsWrap) dotsWrap.style.display = 'none';
			return;
		}

		let activeIndex = 0;
		let timer = null;

		function renderActive(index){
			activeIndex = (index + items.length) % items.length;
			slideEls.forEach((el, idx) => el.classList.toggle('active', idx === activeIndex));
			dotEls.forEach((el, idx) => el.classList.toggle('active', idx === activeIndex));
		}

		function next(){ renderActive(activeIndex + 1); }
		function prev(){ renderActive(activeIndex - 1); }

		function stopAuto(){
			if(timer){
				clearInterval(timer);
				timer = null;
			}
		}

		function startAuto(){
			stopAuto();
			timer = setInterval(next, 5000);
		}

		if(prevBtn){
			prevBtn.addEventListener('click', () => {
				prev();
				startAuto();
			});
		}
		if(nextBtn){
			nextBtn.addEventListener('click', () => {
				next();
				startAuto();
			});
		}
		dotEls.forEach((dot, idx) => {
			dot.addEventListener('click', () => {
				renderActive(idx);
				startAuto();
			});
		});

		const carousel = container.querySelector('.gallery-carousel');
		if(carousel){
			carousel.addEventListener('mouseenter', stopAuto);
			carousel.addEventListener('mouseleave', startAuto);
		}

		startAuto();
	}

	function afterWindowLoad(){
		if(document.readyState === 'complete') return Promise.resolve();
		return new Promise(resolve => {
			window.addEventListener('load', resolve, {once:true});
		});
	}

	function afterNextPaint(){
		return new Promise(resolve => {
			requestAnimationFrame(() => requestAnimationFrame(resolve));
		});
	}

	function renderRideWithGpsEmbed(route, eagerLoad = false){
		const rwgpsSection = document.getElementById('rwgps-section');
		const rwgpsWrap = document.getElementById('rwgps-wrap');
		if(!rwgpsSection || !rwgpsWrap) return;

		const rideWithGpsRouteId = getRideWithGpsRouteId(route);
		if(rideWithGpsRouteId){
			const embedUrl = `https://ridewithgps.com/embeds?type=route&sampleGraph=true&overlay=esriTopo&hideFullLink=1&metricUnits=true&id=${encodeURIComponent(rideWithGpsRouteId)}`;
			rwgpsSection.style.display = '';
			rwgpsWrap.innerHTML = `
				<iframe
					class="rwgps-embed"
					src="${embedUrl}"
					title="${route.name} route map and elevation"
					loading="${eagerLoad ? 'eager' : 'lazy'}"
					scrolling="no"
					referrerpolicy="strict-origin-when-cross-origin">
				</iframe>
			`;
		}else{
			rwgpsSection.style.display = 'none';
			rwgpsWrap.innerHTML = '';
		}
	}

	async function renderGalleryLast(route){
		const gallery = document.getElementById('photo-gallery');
		if(!gallery) return;

		gallery.style.display = 'none';

		try{
			// Let primary route content paint first, then warm map/elevation before gallery.
			await afterWindowLoad();
			await afterNextPaint();
			renderRideWithGpsEmbed(route, true);
			await afterNextPaint();

			// Gallery remains the final load item.
			const galleryPhotos = (await getRouteGalleryPhotos(route)).slice(0, 20);
			initRouteGallery(gallery, galleryPhotos, route.name);
		}catch{
			gallery.innerHTML = '';
			gallery.style.display = 'none';
		}
	}

	async function loadRoute(){
		if(!routeId){
			setText('route-name', 'Route Not Found');
			setText('route-desc', 'No route ID was supplied. Go back to the routes page and choose a route.');
			return;
		}

		let routes = [];
		try{
			routes = await fetchRoutesCatalog();
		}catch(err){
			setText('route-name', 'Route Load Error');
			setText('route-desc', 'Could not load route data.');
			return;
		}

		const route = routes.find(r => r.id === routeId);
		if(!route){
			setText('route-name', 'Route Not Found');
			setText('route-desc', 'This route does not exist in the route data.');
			return;
		}

		document.title = `${route.name} · NZ Bikepacking Routes`;
		setText('route-name', route.name);
		setText('route-desc', route.description);
		trackRoutePageView(route);
		const localNotesText = route.text3 || route.tips || 'Check weather windows, confirm resupply timing, and carry backup navigation.';
		setText('tips-text', localNotesText);
		setText('mobile-tips-text', localNotesText);
		// setText('resupply-text', route.resupply);
		// setText('accommodation-text', route.accommodation);
		renderRouteProfile(route);

		const hero = document.getElementById('hero');
		const highlightPhotos = getRoutePhotos(route);
		hero.style.backgroundImage = `url('${highlightPhotos[0]}')`;
		const difficultyProfile = getRouteDifficultyProfile(route);
		const difficultyExplanation = document.getElementById('difficulty-explanation');
		difficultyExplanation.textContent = difficultyProfile.explanation;
		renderRouteSummary(route, difficultyProfile);

		const meta = document.getElementById('meta-grid');
		const estDays = estimateDays(route);
		const surfaceLabel = formatSurfaceSplit(route);
		const bikeForMeta = getRecommendedBuilderPreset(route, difficultyProfile).bike;
		const elevationLabel = fmtElevation(route);
		const recommendedBike = route.recommendedBike || bikeForMeta || '—';
		const bestSeason = route.bestSeason || '—';
		const stats = [
			{ value: route.distanceLabel || (Number.isFinite(route.distanceMeters) ? fmtKm(route.distanceMeters) : '—'), label: 'Distance', iconKey: 'distance' },
			{ value: elevationLabel || '—', label: 'Elev. Gain', iconKey: 'elevation' },
			{ value: getDaysLabel(route, estDays), label: 'Days', iconKey: 'days' },
			{ value: getUnpavedPercentLabel(route), label: 'Unpaved', iconKey: 'unpaved' },
			{ value: getCompactDifficultyLabel(difficultyProfile.level), label: 'Difficulty', iconKey: 'difficulty' },
			{ value: bestSeason, label: 'Best Season', iconKey: 'season' }
		];
		meta.innerHTML = stats.map(item => {
			const valueClass = item.iconKey === 'bike' ? 'bike' : (item.iconKey === 'days' || item.iconKey === 'difficulty' ? 'compact' : '');
			const iconHtml = `<span class="meta-icon">${getMetaIcon(item.iconKey, recommendedBike)}</span>`;
			return `<div class="box">${iconHtml}<b class="${valueClass}">${escapeHtml(item.value || '—')}</b><span>${item.label}</span></div>`;
		}).join('');

		const videosSection = document.getElementById('videos-section');
		const videoGallery = document.getElementById('video-gallery');
		const videoIds = getYouTubeVideoIds(route);
		if(videoIds.length){
			videosSection.style.display = '';
			videoGallery.innerHTML = videoIds.map(id => `
				<div class="video-embed">
					<iframe
						src="https://www.youtube.com/embed/${id}"
						title="${route.name} video"
						loading="lazy"
						referrerpolicy="strict-origin-when-cross-origin"
						allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
						allowfullscreen>
					</iframe>
				</div>
			`).join('');
		}else{
			videosSection.style.display = 'none';
			videoGallery.innerHTML = '';
		}

		const rideWithGpsUrl = getRideWithGpsUrl(route);

		const linksList = document.getElementById('links-list');
		const resources = getMoreInfoLinks(route).map(entry => ({
			url: entry.url,
			label: entry.label,
			isGpx: false
		}));
		const seenResourceUrls = new Set();
		const uniqueResources = resources.filter(item => {
			const key = String(item.url || '').trim().toLowerCase();
			if(!key || seenResourceUrls.has(key)) return false;
			seenResourceUrls.add(key);
			return true;
		});
		linksList.innerHTML = uniqueResources.length
			? uniqueResources.map(entry => {
				const url = String(entry.url || '').trim();
				const label = getResourceLabel(url, entry.label, entry.isGpx);
				const kind = getResourceKind(url, label, entry.isGpx);
				const leftIconFallback = getResourceIcon(kind);
				const faviconUrl = getResourceFaviconUrl(url);
				const leftIcon = faviconUrl
					? `<span class="resources-icon-wrap"><img class="resources-favicon" src="${escapeHtml(faviconUrl)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"><span class="resources-icon-fallback">${leftIconFallback}</span></span>`
					: leftIconFallback;
				const extIcon = '<svg class="resources-ext" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path><path d="M10 14 19 5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path><path d="M19 13v6h-14v-14h6" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
				const targetAttrs = entry.isGpx
					? 'download'
					: 'target="_blank" rel="noreferrer noopener"';
				return `<li class="resources-item"><a class="resources-link" href="${url}" ${targetAttrs}>${leftIcon}<span class="resources-label">${escapeHtml(label)}</span>${extIcon}</a></li>`;
			}).join('')
			: '<li class="resources-empty">No extra resources listed.</li>';

		renderYouMightAlsoLike(route, routes);

		const recommendedPreset = getRecommendedBuilderPreset(route, difficultyProfile);
		const routeOptionVariants = [
			['Frame Bag (Large)', 'Saddle Bag (13L)', 'Top Tube Bag', 'Sleeping Quilt (3-Season)'],
			['Frame Bag (Large)', 'Bar Roll + Harness', 'Fork Cages (×2)', 'Ultralight Tent (1P)'],
			['Saddle Bag (13L)', 'Top Tube Bag', 'Stem Bag', 'Bivy Shelter'],
			['Frame Bag (Large)', 'Saddle Bag (13L)', 'Bar Roll + Harness', 'Sleeping Quilt (3-Season)']
		];
		const variant = routeOptionVariants[stableIndexFromRoute(route, routeOptionVariants.length)];
		recommendedPreset.options = Array.from(new Set([...(recommendedPreset.options || []), ...variant]));
		const recommendedSetupSection = document.querySelector('.recommended-setup-section');
		const recommendedSetupText = document.getElementById('recommended-setup-text');
		const recommendedSetupBtn = document.getElementById('recommended-setup-btn');
		const setupText = getRecommendedSetupText(route, recommendedPreset);
		if(recommendedSetupText) recommendedSetupText.textContent = setupText;
		if(recommendedSetupSection) recommendedSetupSection.style.display = setupText ? '' : 'none';
		if(recommendedSetupBtn) recommendedSetupBtn.href = getRecommendedBuilderHref(route, recommendedPreset);

		const gpxHref = route.file ? encodeURI(route.file) : '#';
		
		// Populate action card (Download GPX and Ride with GPS)
		const actionCard = document.getElementById('action-card');
		const actionCardHTML = [];
		if(rideWithGpsUrl) {
			actionCardHTML.push(`<a class="action-btn" href="${encodeURI(rideWithGpsUrl)}" target="_blank" rel="noreferrer noopener"><svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M10 14 19 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M19 13v6h-14v-14h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg><span class="action-label">View on Ride with GPS</span></a>`);
		}
		if(route.file) {
			actionCardHTML.push(`<a class="action-btn" href="${gpxHref}" download><svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M8.5 10.5 12 14l3.5-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M5 19h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg><span class="action-label">Download GPX</span></a>`);
		}
		
		if(actionCardHTML.length) {
			actionCard.innerHTML = actionCardHTML.join('');
		} else {
			actionCard.style.display = 'none';
		}
		
		// Populate action row (Back to Routes and Build a Rental Kit)
		const actionRow = document.getElementById('action-row');
		actionRow.innerHTML = `
			<a class="btn" href="routes.html">Back to Routes</a>
		
		`;

		void renderGalleryLast(route);
	}

	loadRoute();
})();
</script>
